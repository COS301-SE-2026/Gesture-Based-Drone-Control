[tool.ruff]

target-version = "py311"

line-length = 100

[tool.ruff.lint]

select = [
    "E",   # bugs + certain code breaks
    "F",   # logical errors + unused code
    "I",   # import ordering
    "N",   # python naming conventions
]

[tool.ruff.format]
quote-style = "double"
indent-style = "tab"